name: Build Playz 3DS Browser

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packaging tools (bannertool, makerom, 3dstools)
        run: |
          dkp-pacman -Sy --noconfirm 3dstools bannertool makerom || true

      - name: Build .3dsx (homebrew launcher executable)
        run: |
          make -j$(nproc)

      - name: Build .cia (FBI-installable package)
        id: cia
        continue-on-error: true
        run: |
          make cia

      - name: Show build output
        run: ls -la

      - name: Upload .3dsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: playz-3ds-browser-3dsx
          path: |
            *.3dsx
            *.smdh

      - name: Upload .cia artifact
        if: steps.cia.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: playz-3ds-browser-cia
          path: "*.cia"

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.3dsx
            *.cia
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
