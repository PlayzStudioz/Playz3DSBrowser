name: Build Playz 3DS Browser

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build-3dsx:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bannertool
        run: |
          apt-get update -y
          apt-get install -y cmake libpng-dev
          git clone https://github.com/carstene1ns/3ds-bannertool.git --depth=1
          cmake -B 3ds-bannertool/build 3ds-bannertool
          cmake --build 3ds-bannertool/build
          cmake --install 3ds-bannertool/build

      - name: Install makerom
        run: |
          git clone https://github.com/3DSGuy/Project_CTR.git --depth=1
          make -C Project_CTR/makerom deps -j$(nproc)
          make -C Project_CTR/makerom program -j$(nproc)
          cp Project_CTR/makerom/bin/makerom /usr/local/bin/

      - name: Build .3dsx and .cia
        run: make -j$(nproc) && make cia

      - name: Upload .3dsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: playz-3ds-browser-3dsx
          path: |
            *.3dsx
            *.smdh

      - name: Upload .cia artifact
        uses: actions/upload-artifact@v4
        with:
          name: playz-3ds-browser-cia
          path: "*.cia"

  release:
    runs-on: ubuntu-latest
    needs: [ build-3dsx ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download 3dsx artifact
        uses: actions/download-artifact@v4
        with:
          name: playz-3ds-browser-3dsx

      - name: Download CIA artifact
        uses: actions/download-artifact@v4
        with:
          name: playz-3ds-browser-cia

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.3dsx
            *.cia
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
